<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Library | 16:9 Widescreen</title>
    <link rel="stylesheet" href="/animevideo.css">
</head>
<body>

<button class="btn-back" onclick="window.history.back()">
  <span class="icon">🔙</span>
  <span class="text">Back</span>
</button>

    <header>
        <h1>My Video Library</h1>
        <input type="text" id="searchInput" placeholder="Search 100+ videos..." onkeyup="filterVideos()">
    </header>



    <main class="video-grid" id="videoGrid"></main>

    <div id="videoOverlay" class="overlay" onclick="closeOnEmpty(event)">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        
        <div class="overlay-content">
            <video id="mainPlayer" controls autoplay>
                <source src="" type="video/mp4">
            </video>
            <div class="overlay-controls">
                <h2 id="overlayTitle">Video Title</h2>
                <a id="downloadBtn" href="#" download class="download-link">Download Video</a>
            </div>
        </div>
    </div>

    <script src="/animevideo.js"></script>




    <!-- Back to Top and Scroll to Bottom Buttons -->
    <button id="backToTop" class="btn-top" onclick="scrollToTop()">
  <span class="icon">🔼</span>
</button>

<script>
    function scrollToTop() {
  window.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
}
</script>

</body>
</html>
