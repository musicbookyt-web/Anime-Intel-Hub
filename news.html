<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Intel Hub | Latest News</title>
    <style>
        :root {
            --accent: #f47521;
            --bg: #000000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --card-hover: #121212;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* --- HEADER --- */
        .site-header {
            border-bottom: 1px solid #222;
            padding: 15px 0;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        /* --- NEWS LIST (Image 1 Style) --- */
        .news-card {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-radius: 4px;
            padding: 5px;
        }

        .news-card:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            box-shadow: 0 10px 30px rgba(244, 117, 33, 0.1);
        }

        .thumb-wrap { width: 280px; height: 157px; flex-shrink: 0; overflow: hidden; border-radius: 2px; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .badge-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .tag { font-size: 10px; font-weight: 800; padding: 2px 5px; text-transform: uppercase; border-radius: 2px; }
        .tag.latest { background: var(--accent); color: #000; }
        .tag.cat { color: var(--accent); border: 1px solid var(--accent); }

        .news-title { font-size: 1.2rem; font-weight: 700; margin: 0 0 10px 0; line-height: 1.3; color: #fff; }
        
        /* EXACT DATE PLACEMENT */
        .news-date { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        .news-author { font-size: 12px; color: var(--text-dim); font-weight: 400; }

        /* --- ARTICLE VIEW (Image 2 Style) --- */
        .article-view { display: none; animation: fadeIn 0.4s ease; }
        .breadcrumb { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; cursor: pointer; }
        .breadcrumb b { color: var(--accent); }
        .art-title { font-size: 2.4rem; font-weight: 800; line-height: 1.1; margin: 15px 0; }
        .art-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .art-hero { width: 100%; border-radius: 4px; margin-bottom: 25px; }
        .art-content { line-height: 1.8; font-size: 1.1rem; color: #ccc; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 700px) {
            .news-card { flex-direction: column; }
            .thumb-wrap { width: 100%; height: auto; aspect-ratio: 16/9; }
            .art-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="site-header">
        <div class="logo"><span>ANIME INTEL HUB</span> NEWS</div>
    </header>

    <div id="list-view">
        <div id="loader" style="text-align: center; padding: 50px;">Fetching latest updates...</div>
    </div>

    <div id="article-view" class="article-view">
        <div class="breadcrumb" onclick="closeArticle()">Anime Intel Hub Home > News Home > <b>Latest</b></div>
        <div class="badge-row">
            <span class="tag latest">LATEST NEWS</span>
            <span class="tag cat" id="view-cat">ANIME</span>
        </div>
        <h1 class="art-title" id="view-title"></h1>
        <div class="art-meta">
            <div id="view-date"></div>
            <div id="view-author" style="margin-top:5px; color:#fff;"></div>
        </div>
        <img src="" id="view-img" class="art-hero">
        <div id="view-content" class="art-content"></div>
        <button onclick="closeArticle()" style="background:var(--accent); border:none; padding:10px 20px; color:#000; font-weight:bold; margin-top:30px; cursor:pointer; border-radius:3px;">BACK TO FEED</button>
    </div>
</div>

<script>
    const FEED_URL = "https://www.crunchyroll.com/news/latest.rss";
    let newsStorage = [];

    async function getNews() {
        try {
            // Using a high-speed logic bypass for RSS
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(FEED_URL)}`);
            const json = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(json.contents, "text/xml");
            const items = xml.querySelectorAll("item");

            if (items.length === 0) throw new Error("No items found");

            newsStorage = Array.from(items).slice(0, 20).map(item => {
                // Formatting Date properly
                const pubDateElement = item.querySelector("pubDate");
                const d = new Date(pubDateElement ? pubDateElement.textContent : new Date());
                const dateStr = d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }).toUpperCase() + " IST";
                
                return {
                    title: item.querySelector("title").textContent.replace(/Crunchyroll/gi, "Anime Intel Hub"),
                    desc: item.querySelector("description").textContent.replace(/Crunchyroll/gi, "Anime Intel Hub"),
                    author: item.getElementsByTagName("dc:creator")[0]?.textContent || "Anime Intel Hub Staff",
                    date: dateStr,
                    img: item.getElementsByTagName("media:thumbnail")[0]?.getAttribute("url") || item.getElementsByTagName("media:content")[0]?.getAttribute("url") || "https://via.placeholder.com/600x400"
                };
            });
            renderList();
        } catch (e) {
            document.getElementById('loader').innerHTML = "Connection timeout. Please refresh.";
            console.error("Error fetching news:", e);
        }
    }

    function renderList() {
        const list = document.getElementById('list-view');
        list.innerHTML = newsStorage.map((item, i) => `
            <div class="news-card" onclick="openArticle(${i})">
                <div class="thumb-wrap"><img src="${item.img}"></div>
                <div class="info">
                    <div class="badge-row">
                        <span class="tag latest">LATEST NEWS</span>
                        <span class="tag cat">ANIME</span>
                    </div>
                    <h2 class="news-title">${item.title}</h2>
                    <div class="news-date">${item.date}</div>
                    <div class="news-author">👤 ${item.author}</div>
                </div>
            </div>
        `).join('');
    }

    function openArticle(i) {
        const item = newsStorage[i];
        document.getElementById('view-title').innerText = item.title;
        document.getElementById('view-date').innerText = "Published: " + item.date;
        document.getElementById('view-author').innerText = "By " + item.author;
        document.getElementById('view-img').src = item.img;
        document.getElementById('view-content').innerHTML = item.desc;

        document.getElementById('list-view').style.display = 'none';
        document.getElementById('article-view').style.display = 'block';
        window.scrollTo(0,0);
    }

    function closeArticle() {
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('article-view').style.display = 'none';
    }

    getNews();
</script>

</body>
</html>
